<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agent Chat</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--vscode-font-family, sans-serif);
      font-size: var(--vscode-font-size, 13px);
      color: var(--vscode-foreground);
      background: var(--vscode-sideBar-background);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    #chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      padding: 8px 12px;
      border-radius: 6px;
      max-width: 95%;
      word-wrap: break-word;
      line-height: 1.5;
    }

    .message.user {
      align-self: flex-end;
      background: var(--vscode-button-background);
      color: var(--vscode-button-foreground);
    }

    .message.assistant {
      align-self: flex-start;
      background: var(--vscode-editor-background);
      border: 1px solid var(--vscode-widget-border, #333);
    }

    .agent-badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 2px 6px;
      border-radius: 3px;
      margin-bottom: 4px;
      background: var(--vscode-badge-background);
      color: var(--vscode-badge-foreground);
    }

    .message pre {
      background: var(--vscode-textCodeBlock-background, #1e1e1e);
      padding: 8px;
      border-radius: 4px;
      overflow-x: auto;
      margin: 6px 0;
      font-family: var(--vscode-editor-font-family, monospace);
      font-size: var(--vscode-editor-font-size, 12px);
    }

    .message code {
      font-family: var(--vscode-editor-font-family, monospace);
      font-size: var(--vscode-editor-font-size, 12px);
      background: var(--vscode-textCodeBlock-background, #1e1e1e);
      padding: 1px 4px;
      border-radius: 3px;
    }

    .error-message {
      color: var(--vscode-errorForeground);
      font-style: italic;
      padding: 8px 12px;
    }

    .typing-indicator {
      display: none;
      align-self: flex-start;
      padding: 8px 12px;
      color: var(--vscode-descriptionForeground);
      font-style: italic;
    }

    .typing-indicator.visible {
      display: block;
    }

    #input-container {
      display: flex;
      gap: 6px;
      padding: 8px 12px;
      border-top: 1px solid var(--vscode-widget-border, #333);
      background: var(--vscode-sideBar-background);
    }

    #message-input {
      flex: 1;
      padding: 8px 10px;
      border: 1px solid var(--vscode-input-border, #333);
      border-radius: 4px;
      background: var(--vscode-input-background);
      color: var(--vscode-input-foreground);
      font-family: inherit;
      font-size: inherit;
      outline: none;
      resize: none;
      min-height: 36px;
      max-height: 120px;
    }

    #message-input:focus {
      border-color: var(--vscode-focusBorder);
    }

    #send-btn, #cancel-btn {
      padding: 8px 12px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: inherit;
    }

    #send-btn {
      background: var(--vscode-button-background);
      color: var(--vscode-button-foreground);
    }

    #send-btn:hover {
      background: var(--vscode-button-hoverBackground);
    }

    #cancel-btn {
      display: none;
      background: var(--vscode-button-secondaryBackground);
      color: var(--vscode-button-secondaryForeground);
    }

    #cancel-btn.visible {
      display: inline-block;
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--vscode-descriptionForeground);
      text-align: center;
      padding: 20px;
      gap: 8px;
    }

    .empty-state h3 {
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div id="chat-container">
    <div class="empty-state" id="empty-state">
      <h3>Multi-Agent Code Assistant</h3>
      <p>Ask a question about your code, request a refactor, or describe what you want to build.</p>
    </div>
  </div>

  <div class="typing-indicator" id="typing-indicator">
    <span class="agent-badge" id="typing-agent"></span> thinking...
  </div>

  <div id="input-container">
    <textarea
      id="message-input"
      placeholder="Ask the assistant..."
      rows="1"
    ></textarea>
    <button id="send-btn">Send</button>
    <button id="cancel-btn">Stop</button>
  </div>

  <script>
    // @ts-nocheck
    const vscode = acquireVsCodeApi();

    const chatContainer = document.getElementById("chat-container");
    const emptyState = document.getElementById("empty-state");
    const messageInput = document.getElementById("message-input");
    const sendBtn = document.getElementById("send-btn");
    const cancelBtn = document.getElementById("cancel-btn");
    const typingIndicator = document.getElementById("typing-indicator");
    const typingAgent = document.getElementById("typing-agent");

    let currentAssistantEl = null;
    let isStreaming = false;

    // Auto-resize textarea
    messageInput.addEventListener("input", () => {
      messageInput.style.height = "auto";
      messageInput.style.height = Math.min(messageInput.scrollHeight, 120) + "px";
    });

    // Send on Enter (Shift+Enter for newline)
    messageInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    sendBtn.addEventListener("click", sendMessage);
    cancelBtn.addEventListener("click", () => {
      vscode.postMessage({ type: "cancel" });
    });

    function sendMessage() {
      const text = messageInput.value.trim();
      if (!text || isStreaming) return;

      vscode.postMessage({ type: "sendMessage", text });
      messageInput.value = "";
      messageInput.style.height = "auto";
    }

    function addMessage(role, content, agent) {
      // Hide empty state on first message
      if (emptyState) {
        emptyState.style.display = "none";
      }

      const el = document.createElement("div");
      el.className = `message ${role}`;

      if (agent && role === "assistant") {
        const badge = document.createElement("div");
        badge.className = "agent-badge";
        badge.textContent = agent;
        el.appendChild(badge);
      }

      const contentEl = document.createElement("div");
      contentEl.innerHTML = renderMarkdown(content);
      el.appendChild(contentEl);

      chatContainer.appendChild(el);
      scrollToBottom();
      return el;
    }

    function scrollToBottom() {
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function renderMarkdown(text) {
      // Simple markdown rendering: code blocks, inline code, bold, italic
      let html = escapeHtml(text);

      // Code blocks: ```...```
      html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
        return `<pre><code>${code.trim()}</code></pre>`;
      });

      // Inline code: `...`
      html = html.replace(/`([^`]+)`/g, "<code>$1</code>");

      // Bold: **...**
      html = html.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");

      // Italic: *...*
      html = html.replace(/\*(.+?)\*/g, "<em>$1</em>");

      // Line breaks
      html = html.replace(/\n/g, "<br>");

      return html;
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text;
      return div.innerHTML;
    }

    // Handle messages from the extension
    window.addEventListener("message", (event) => {
      const msg = event.data;

      switch (msg.type) {
        case "addMessage":
          addMessage(msg.role, msg.content, msg.agent);
          break;

        case "streamStart":
          isStreaming = true;
          sendBtn.style.display = "none";
          cancelBtn.classList.add("visible");
          // Create assistant message container
          if (emptyState) emptyState.style.display = "none";
          currentAssistantEl = document.createElement("div");
          currentAssistantEl.className = "message assistant";
          chatContainer.appendChild(currentAssistantEl);
          break;

        case "agentStart":
          typingAgent.textContent = msg.agent;
          typingIndicator.classList.add("visible");
          // Add agent badge to current message
          if (currentAssistantEl) {
            const badge = document.createElement("div");
            badge.className = "agent-badge";
            badge.textContent = msg.agent;
            currentAssistantEl.appendChild(badge);
          }
          break;

        case "token":
          typingIndicator.classList.remove("visible");
          if (currentAssistantEl) {
            // Append token text
            const lastChild = currentAssistantEl.lastChild;
            if (lastChild && lastChild.nodeType === Node.TEXT_NODE) {
              lastChild.textContent += msg.content;
            } else {
              currentAssistantEl.appendChild(
                document.createTextNode(msg.content)
              );
            }
            scrollToBottom();
          }
          break;

        case "done":
          isStreaming = false;
          sendBtn.style.display = "inline-block";
          cancelBtn.classList.remove("visible");
          typingIndicator.classList.remove("visible");
          // Re-render the final content with markdown
          if (currentAssistantEl) {
            const rawText = currentAssistantEl.textContent || "";
            // Keep badges, re-render text content
            const badges = currentAssistantEl.querySelectorAll(".agent-badge");
            currentAssistantEl.innerHTML = "";
            badges.forEach((b) => currentAssistantEl.appendChild(b));
            const contentDiv = document.createElement("div");
            contentDiv.innerHTML = renderMarkdown(rawText);
            currentAssistantEl.appendChild(contentDiv);
          }
          currentAssistantEl = null;
          scrollToBottom();
          break;

        case "error":
          isStreaming = false;
          sendBtn.style.display = "inline-block";
          cancelBtn.classList.remove("visible");
          typingIndicator.classList.remove("visible");
          const errEl = document.createElement("div");
          errEl.className = "error-message";
          errEl.textContent = "Error: " + msg.content;
          chatContainer.appendChild(errEl);
          currentAssistantEl = null;
          scrollToBottom();
          break;
      }
    });

    // Focus input on load
    messageInput.focus();
  </script>
</body>
</html>
